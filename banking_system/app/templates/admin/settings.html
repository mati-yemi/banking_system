{% extends "base.html" %}
{% block content %}
<div class="glass-card">
    <div class="header-with-action">
        <h1 class="premium-title">System Settings</h1>
        <a href="{{ url_for('admin.dashboard') }}" class="btn-back">← Back to Dashboard</a>
    </div>

    <form method="POST" class="settings-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="withdrawal_limit">Max Auto-Approve Withdrawal Amount ($)</label>
            <p class="field-desc">Withdrawals above this amount will require administrative approval.</p>
            <input type="number" name="withdrawal_limit" id="withdrawal_limit" 
                   value="{{ withdrawal_limit }}" step="0.01" class="form-control" required>
        </div>
        
        <div style="margin-top: 2rem;">
            <button type="submit" class="btn btn-primary">Save Settings</button>
        </div>
    </form>
</div>

<style>
    .settings-form {
        max-width: 500px;
        margin-top: 2rem;
    }
    .form-group {
        margin-bottom: 1.5rem;
    }
    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: var(--text-primary);
    }
    .field-desc {
        font-size: 0.85rem;
        color: var(--text-secondary);
        margin-bottom: 1rem;
    }
    .form-control {
        width: 100%;
        padding: 0.8rem;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        color: white;
        font-size: 1rem;
    }
    .header-with-action {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
    }
    .btn-back {
        color: var(--text-secondary);
        text-decoration: none;
        font-size: 0.9rem;
    }
</style>
{% endblock %}
