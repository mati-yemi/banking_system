{% extends "base.html" %}
{% block content %}
<div class="glass-card" style="max-width: 500px; margin: 0 auto;">
    <h2 style="margin-bottom: 2rem;">Deposit Funds</h2>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="amount">Amount to Deposit ($)</label>
            <input type="number" step="0.01" min="0.01" name="amount" id="amount" placeholder="0.00" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Confirm Deposit</button>
    </form>
    <a href="{{ url_for('banking.dashboard') }}" style="display: block; text-align: center; margin-top: 1.5rem; color: var(--text-secondary); text-decoration: none;">Back to Dashboard</a>
</div>
{% endblock content %}
